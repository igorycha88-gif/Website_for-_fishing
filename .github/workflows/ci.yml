name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - email-service
          - forecast-service
          - places-service
          - reports-service
          - booking-service
          - shop-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet ruff

      - name: Lint (ruff)
        working-directory: services/${{ matrix.service }}
        run: ruff check .

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d "tests" ] && find tests -name "test_*.py" | grep -q .; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests found for ${{ matrix.service }} — skipped"
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: npm test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service
        uses: docker/build-push-action@v6
        with:
          context: services/auth-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build email-service
        uses: docker/build-push-action@v6
        with:
          context: services/email-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build forecast-service
        uses: docker/build-push-action@v6
        with:
          context: services/forecast-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3000
