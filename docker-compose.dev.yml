version: '3.8'

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service"

x-backend-resources: &backend-resources
  limits:
    cpus: '1'
    memory: 512M
  reservations:
    cpus: '0.25'
    memory: 256M

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fishing_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/migrations/001_add_water_type_to_places.sql:/docker-entrypoint-initdb.d/02-migration-001.sql
      - ./database/migrations/002_add_spawn_fields.sql:/docker-entrypoint-initdb.d/03-migration-002.sql
      - ./database/migrations/002b_update_spawn_periods.sql:/docker-entrypoint-initdb.d/04-migration-002b.sql
      - ./database/migrations/003_add_bait_lure_columns.sql:/docker-entrypoint-initdb.d/05-migration-003.sql
      - ./database/migrations/003_add_user_added_fish.sql:/docker-entrypoint-initdb.d/06-migration-003b.sql
      - ./database/migrations/004_add_jwt_blacklist_fields.sql:/docker-entrypoint-initdb.d/07-migration-004.sql
      - ./database/migrations/005_create_password_reset_tokens.sql:/docker-entrypoint-initdb.d/08-migration-005.sql
      - ./database/migrations/006_add_user_profile_fields.sql:/docker-entrypoint-initdb.d/09-migration-006.sql
      - ./database/migrations/007_add_climate_zones.sql:/docker-entrypoint-initdb.d/10-migration-007.sql
      - ./database/migrations/008_forecast_v5_fields.sql:/docker-entrypoint-initdb.d/11-migration-008.sql
      - ./database/migrations/009_add_depth_to_places.sql:/docker-entrypoint-initdb.d/12-migration-009.sql
      - ./database/migrations/010_create_ru_water_bodies.sql:/docker-entrypoint-initdb.d/13-migration-010.sql
      - ./database/migrations/011_create_water_body_polygons.sql:/docker-entrypoint-initdb.d/14-migration-011.sql
    ports:
      - "5432:5432"
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fishing_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_password@postgres:5432/fishing_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      EMAIL_SERVICE_URL: http://email-service:8005
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY}
      ENABLE_EMAIL_SENDING: ${ENABLE_EMAIL_SENDING:-false}
      EMAIL_CODE_EXPIRE_MINUTES: ${EMAIL_CODE_EXPIRE_MINUTES:-15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: ${SERVICE_NAME:-auth-service}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      email-service:
        condition: service_started
    deploy:
      resources: *backend-resources

  email-service:
    build:
      context: ./services/email-service
      dockerfile: Dockerfile
    ports:
      - "8006:8005"
    environment:
      SMTP_HOST: ${SMTP_HOST:-smtp.yandex.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-FishMap}
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY}
      ENABLE_EMAIL_SENDING: ${ENABLE_EMAIL_SENDING:-false}
      EMAIL_CODE_EXPIRE_MINUTES: ${EMAIL_CODE_EXPIRE_MINUTES:-15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: ${SERVICE_NAME:-email-service}
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  places-service:
    build:
      context: ./services/places-service
      dockerfile: Dockerfile
    ports:
      - "8002:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_password@postgres:5432/fishing_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: ${SERVICE_NAME:-places-service}
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources: *backend-resources

  reports-service:
    build:
      context: ./services/reports-service
      dockerfile: Dockerfile
    ports:
      - "8003:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_password@postgres:5432/fishing_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: ${SERVICE_NAME:-reports-service}
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources: *backend-resources

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    ports:
      - "8004:8003"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_password@postgres:5432/fishing_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: ${SERVICE_NAME:-booking-service}
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources: *backend-resources

  shop-service:
    build:
      context: ./services/shop-service
      dockerfile: Dockerfile
    ports:
      - "8005:8004"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_password@postgres:5432/fishing_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: ${SERVICE_NAME:-shop-service}
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources: *backend-resources

  forecast-service:
    build:
      context: ./services/forecast-service
      dockerfile: Dockerfile
    ports:
      - "8007:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_password@postgres:5432/fishing_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: ${SERVICE_NAME:-forecast-service}
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      places-service:
        condition: service_started
    deploy:
      resources: *backend-resources

  depth-service:
    build:
      context: ./services/depth-service
      dockerfile: Dockerfile
    ports:
      - "8008:8000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGSTASH_URL: ${LOGSTASH_URL:-http://logstash:5000}
      SERVICE_NAME: depth-service
      GEBCO_WMS_URL: https://wms.gebco.net/mapserv
      GEBCO_WMS_LAYER: GEBCO_LATEST
      GEBCO_QUERY_LAYER: GEBCO_LATEST_2
      OVERPASS_API_URL: https://overpass-api.de/api/interpreter
      OVERPASS_TIMEOUT: 10
      OVERPASS_SEARCH_RADIUS_M: 50
      DEPTH_CACHE_TTL: 86400
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-fishing_db}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources: *backend-resources

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        DOCKER_ENV: "true"
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY}
        NEXT_PUBLIC_API_URL: http://localhost:3000
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    environment:
      DOCKER_ENV: 'true'
      AUTH_SERVICE_URL: http://auth-service:8000
      PLACES_SERVICE_URL: http://places-service:8001
      REPORTS_SERVICE_URL: http://reports-service:8002
      BOOKING_SERVICE_URL: http://booking-service:8003
      SHOP_SERVICE_URL: http://shop-service:8004
      EMAIL_SERVICE_URL: http://email-service:8005
      FORECAST_SERVICE_URL: http://forecast-service:8000
      DEPTH_SERVICE_URL: http://depth-service:8000
    networks:
      - fishing-network
    restart: unless-stopped
    logging: *logging
    depends_on:
      - auth-service
      - places-service
      - reports-service
      - booking-service
      - shop-service
      - email-service
      - forecast-service
      - depth-service
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  fishing-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
